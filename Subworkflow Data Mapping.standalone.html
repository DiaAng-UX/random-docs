document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

689731aa5\") format('truetype'); }\n@font-face { font-family: 'Open Sans'; font-style: italic; font-weight: 800; font-display: swap; src: url(\"e10c76d9-2fce-42f0-a4e3-57e9953e6bba\") format('truetype'); }\n\n:root {\n  /* ========================================================================\n   * PALETTES — 10-step scales\n   * ======================================================================== */\n\n  /* Blue — primary / interactive */\n  --flowx-blue-50:  #e6f0fb;\n  --flowx-blue-100: #b0d1f3;\n  --flowx-blue-200: #8abbed;\n  --flowx-blue-300: #549ce5;\n  --flowx-blue-400: #3389e0;\n  --flowx-blue-500: #006bd8;\n  --flowx-blue-600: #005fc0;\n  --flowx-blue-700: #004c99;\n  --flowx-blue-800: #003b77;\n  --flowx-blue-900: #002d5b;\n\n  /* Yellow — warning */\n  --flowx-yellow-50:  #fff8e7;\n  --flowx-yellow-100: #ffe9b6;\n  --flowx-yellow-200: #ffdf92;\n  --flowx-yellow-300: #fed061;\n  --flowx-yellow-400: #fec742;\n  --flowx-yellow-500: #feb913;\n  --flowx-yellow-600: #e7a811;\n  --flowx-yellow-700: #b4830d;\n  --flowx-yellow-800: #8c660a;\n  --flowx-yellow-900: #6b4e08;\n\n  /* Green — success */\n  --flowx-green-50:  #e6f2ef;\n  --flowx-green-100: #b0d8ce;\n  --flowx-green-200: #8ac5b6;\n  --flowx-green-300: #54aa94;\n  --flowx-green-400: #339980;\n  --flowx-green-500: #008060;\n  --flowx-green-600: #007457;\n  --flowx-green-700: #005b44;\n  --flowx-green-800: #004635;\n  --flowx-green-900: #003628;\n\n  /* Orange — accent / highlight */\n  --flowx-orange-50:  #fff0e8;\n  --flowx-orange-100: #fed1b9;\n  --flowx-orange-200: #febb97;\n  --flowx-orange-300: #fe9c67;\n  --flowx-orange-400: #fd8949;\n  --flowx-orange-500: #fd6b1c;\n  --flowx-orange-600: #e66119;\n  --flowx-orange-700: #b44c14;\n  --flowx-orange-800: #8b3b0f;\n  --flowx-orange-900: #6a2d0c;\n\n  /* Red — danger / error */\n  --flowx-red-50:  #fde9e6;\n  --flowx-red-100: #f7bab0;\n  --flowx-red-200: #f4998a;\n  --flowx-red-300: #ee6b54;\n  --flowx-red-400: #eb4e33;\n  --flowx-red-500: #e62200;\n  --flowx-red-600: #d11f00;\n  --flowx-red-700: #a31800;\n  --flowx-red-800: #7f1300;\n  --flowx-red-900: #610e00;\n\n  /* Neutrals — surfaces, text, borders */\n  --flowx-neutrals-50:  #f7f8f9;\n  --flowx-neutrals-100: #e3e8ed;\n  --flowx-neutrals-200: #cbd1db;\n  --flowx-neutrals-300: #a6b0be;\n  --flowx-neutrals-400: #8390a2;\n  --flowx-neutrals-500: #64748b;\n  --flowx-neutrals-600: #5b6a7e;\n  --flowx-neutrals-700: #475263;\n  --flowx-neutrals-800: #2a313a;\n  --flowx-neutrals-900: #1d232c;\n\n  --flowx-grays-50:  #ffffff;\n  --flowx-grays-900: #000000;\n\n  /* ========================================================================\n   * SEMANTIC TOKENS — LIGHT (default)\n   * ======================================================================== */\n  --flowx-surface-primary:     var(--flowx-grays-50);\n  --flowx-surface-secondary:   var(--flowx-neutrals-50);\n  --flowx-surface-tertiary:    var(--flowx-neutrals-100);\n\n  --flowx-text-primary:        var(--flowx-neutrals-900);\n  --flowx-text-secondary:      var(--flowx-neutrals-500);\n  --flowx-text-tertiary:       #6b7789; /* description color, seen in inputs */\n  --flowx-text-disabled:       var(--flowx-neutrals-300);\n  --flowx-text-on-brand:       var(--flowx-grays-50);\n\n  --flowx-border-subtle:       var(--flowx-neutrals-50);\n  --flowx-border-default:      var(--flowx-neutrals-100);\n  --flowx-border-strong:       var(--flowx-neutrals-400);\n\n  --flowx-interactive-default: var(--flowx-blue-500);\n  --flowx-interactive-hover:   var(--flowx-blue-600);\n  --flowx-interactive-pressed: var(--flowx-blue-700);\n  --flowx-interactive-subtle:  var(--flowx-blue-50);\n\n  --flowx-success:             var(--flowx-green-500);\n  --flowx-success-subtle:      var(--flowx-green-50);\n  --flowx-warning:             var(--flowx-orange-500);\n  --flowx-warning-subtle:      var(--flowx-orange-50);\n  --flowx-accent:              var(--flowx-yellow-500);\n  --flowx-accent-subtle:       var(--flowx-yellow-50);\n  --flowx-error:               var(--flowx-red-500);\n  --flowx-error-subtle:        var(--flowx-red-50);\n  --flowx-info:                var(--flowx-blue-500);\n  --flowx-info-subtle:         var(--flowx-blue-50);\n\n  /* Focus ring — 3px blue-400 halo at 24% opacity */\n  --flowx-focus-ring: 0 0 0 3px rgba(51, 137, 224, 0.32);\n\n  /* ========================================================================\n   * SPACING — 0 → 160\n   * ======================================================================== */\n  --flowx-space-0:   0;\n  --flowx-space-1:   1px;\n  --flowx-space-2:   2px;\n  --flowx-space-4:   4px;\n  --flowx-space-6:   6px;\n  --flowx-space-8:   8px;\n  --flowx-space-12:  12px;\n  --flowx-space-16:  16px;\n  --flowx-space-24:  24px;\n  --flowx-space-32:  32px;\n  --flowx-space-40:  40px;\n  --flowx-space-48:  48px;\n  --flowx-space-56:  56px;\n  --flowx-space-64:  64px;\n  --flowx-space-80:  80px;\n  --flowx-space-96:  96px;\n  --flowx-space-112: 112px;\n  --flowx-space-128: 128px;\n  --flowx-space-144: 144px;\n  --flowx-space-160: 160px;\n\n  /* ========================================================================\n   * RADIUS\n   * ======================================================================== */\n  --flowx-radius-2:   2px;\n  --flowx-radius-4:   4px;\n  --flowx-radius-6:   6px;\n  --flowx-radius-8:   8px;   /* canonical — buttons, inputs, cards */\n  --flowx-radius-12:  12px;\n  --flowx-radius-16:  16px;  /* large cards, tables */\n  --flowx-radius-24:  24px;\n  --flowx-radius-32:  32px;\n  --flowx-radius-40:  40px;\n  --flowx-radius-48:  48px;\n  --flowx-radius-120: 120px; /* pill */\n\n  /* ========================================================================\n   * ELEVATION — shadow color is #163462 @ 10%\n   * ======================================================================== */\n  --flowx-shadow-xs: 0 2px 8px   #1634621a;\n  --flowx-shadow-s:  0 4px 12px  #1634621a;\n  --flowx-shadow-m:  0 8px 16px  #1634621a;\n  --flowx-shadow-l:  0 16px 24px #1634621a;\n  --flowx-shadow-xl: 0 24px 32px #1634621a;\n\n  /* ========================================================================\n   * OPACITY\n   * ======================================================================== */\n  --flowx-opacity-0:  0;\n  --flowx-opacity-5:  0.05;\n  --flowx-opacity-10: 0.10;\n  --flowx-opacity-15: 0.15;\n  --flowx-opacity-20: 0.20;\n  --flowx-opacity-25: 0.25;\n  --flowx-opacity-30: 0.30;\n  --flowx-opacity-40: 0.40;\n  --flowx-opacity-50: 0.50;\n  --flowx-opacity-60: 0.60;\n  --flowx-opacity-70: 0.70;\n  --flowx-opacity-80: 0.80;\n  --flowx-opacity-90: 0.90;\n\n  /* ========================================================================\n   * TYPOGRAPHY — families, weights\n   * ======================================================================== */\n  --flowx-font-sans: 'Open Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;\n  --flowx-font-mono: ui-monospace, SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace;\n\n  --flowx-fw-regular:   400;\n  --flowx-fw-semibold:  600;\n  --flowx-fw-bold:      700;\n  --flowx-fw-extrabold: 800;\n\n  /* Sizes */\n  --flowx-fs-xs:   10px;\n  --flowx-fs-s:    12px;\n  --flowx-fs-m:    14px;\n  --flowx-fs-l:    18px;\n  --flowx-fs-xl:   24px;\n  --flowx-fs-xxl:  40px;\n  --flowx-fs-xxxl: 72px;\n\n  /* Line heights — from spec */\n  --flowx-lh-12:  12px;\n  --flowx-lh-16:  16px;\n  --flowx-lh-18:  18px;\n  --flowx-lh-22:  22px;\n  --flowx-lh-24:  24px;\n  --flowx-lh-28:  28px;\n  --flowx-lh-38:  38px;\n  --flowx-lh-60:  60px;\n  --flowx-lh-108: 108px;\n}\n\n/* ==========================================================================\n * DARK MODE\n * Toggle via `data-theme=\"dark\"` on <html> or <body>, or media query.\n * ========================================================================== */\n[data-theme=\"dark\"] {\n  --flowx-surface-primary:     var(--flowx-neutrals-900);\n  --flowx-surface-secondary:   var(--flowx-neutrals-800);\n  --flowx-surface-tertiary:    var(--flowx-neutrals-700);\n\n  --flowx-text-primary:        var(--flowx-neutrals-50);\n  --flowx-text-secondary:      var(--flowx-neutrals-400);\n  --flowx-text-tertiary:       var(--flowx-neutrals-400);\n  --flowx-text-disabled:       var(--flowx-neutrals-500);\n  --flowx-text-on-brand:       var(--flowx-grays-50);\n\n  --flowx-border-subtle:       var(--flowx-neutrals-800);\n  --flowx-border-default:      var(--flowx-neutrals-700);\n  --flowx-border-strong:       var(--flowx-neutrals-500);\n\n  --flowx-interactive-default: var(--flowx-blue-400);\n  --flowx-interactive-hover:   var(--flowx-blue-500);\n  --flowx-interactive-pressed: var(--flowx-blue-600);\n  --flowx-interactive-subtle:  var(--flowx-blue-900);\n\n  --flowx-error:               var(--flowx-red-400);\n  --flowx-error-subtle:        var(--flowx-red-900);\n}\n\n/* ==========================================================================\n * SEMANTIC TEXT PRESETS\n * Drop these classes on elements, or use the @extend-style mixins in SCSS.\n * ========================================================================== */\n.flowx-display-1,\n.flowx-h0 {\n  font-family: var(--flowx-font-sans);\n  font-size: var(--flowx-fs-xxxl);   /* 72 */\n  line-height: var(--flowx-lh-108);\n  font-weight: var(--flowx-fw-bold);\n  letter-spacing: -0.02em;\n  color: var(--flowx-text-primary);\n}\n\n.flowx-h1 {\n  font-family: var(--flowx-font-sans);\n  font-size: var(--flowx-fs-xxl);    /* 40 */\n  line-height: var(--flowx-lh-60);\n  font-weight: var(--flowx-fw-bold);\n  letter-spacing: -0.01em;\n  color: var(--flowx-text-primary);\n}\n\n.flowx-h2 {\n  font-family: var(--flowx-font-sans);\n  font-size: var(--flowx-fs-xl);     /* 24 */\n  line-height: var(--flowx-lh-38);\n  font-weight: var(--flowx-fw-bold);\n  color: var(--flowx-text-primary);\n}\n\n.flowx-h3 {\n  font-family: var(--flowx-font-sans);\n  font-size: var(--flowx-fs-l);      /* 18 */\n  line-height: var(--flowx-lh-28);\n  font-weight: var(--flowx-fw-bold);\n  color: var(--flowx-text-primary);\n}\n\n.flowx-p,\n.flowx-body {\n  font-family: var(--flowx-font-sans);\n  font-size: var(--flowx-fs-m);      /* 14 */\n  line-height: var(--flowx-lh-24);\n  font-weight: var(--flowx-fw-regular);\n  color: var(--flowx-text-primary);\n}\n\n.flowx-p-lead {\n  font-family: var(--flowx-font-sans);\n  font-size: var(--flowx-fs-l);      /* 18 */\n  line-height: var(--flowx-lh-28);\n  font-weight: var(--flowx-fw-regular);\n  color: var(--flowx-text-primary);\n}\n\n.flowx-caption,\n.flowx-small {\n  font-family: var(--flowx-font-sans);\n  font-size: var(--flowx-fs-s);      /* 12 */\n  line-height: var(--flowx-lh-16);\n  font-weight: var(--flowx-fw-regular);\n  color: var(--flowx-text-secondary);\n}\n\n.flowx-overline {\n  font-family: var(--flowx-font-sans);\n  font-size: var(--flowx-fs-xs);     /* 10 */\n  line-height: var(--flowx-lh-12);\n  font-weight: var(--flowx-fw-bold);\n  text-transform: uppercase;\n  letter-spacing: 0.08em;\n  color: var(--flowx-text-secondary);\n}\n\n.flowx-label {\n  font-family: var(--flowx-font-sans);\n  font-size: var(--flowx-fs-m);      /* 14 */\n  line-height: var(--flowx-lh-24);\n  font-weight: var(--flowx-fw-semibold);\n  color: var(--flowx-text-primary);\n}\n\n.flowx-code,\n.flowx-mono {\n  font-family: var(--flowx-font-mono);\n  font-size: var(--flowx-fs-s);      /* 12 */\n  line-height: var(--flowx-lh-16);\n  font-weight: var(--flowx-fw-regular);\n  color: var(--flowx-text-primary);\n}\n\n/* Element-level defaults (optional — opt in by adding .flowx-typeset to a wrapper) */\n.flowx-typeset { font-family: var(--flowx-font-sans); color: var(--flowx-text-primary); }\n.flowx-typeset h1 { font-size: var(--flowx-fs-xxl); line-height: var(--flowx-lh-60); font-weight: 700; letter-spacing: -0.01em; }\n.flowx-typeset h2 { font-size: var(--flowx-fs-xl); line-height: var(--flowx-lh-38); font-weight: 700; }\n.flowx-typeset h3 { font-size: var(--flowx-fs-l);  line-height: var(--flowx-lh-28); font-weight: 700; }\n.flowx-typeset p  { font-size: var(--flowx-fs-m);  line-height: var(--flowx-lh-24); font-weight: 400; }\n.flowx-typeset code { font-family: var(--flowx-font-mono); font-size: 0.9em; padding: 2px 6px; background: var(--flowx-neutrals-100); border-radius: var(--flowx-radius-4); }\n<\u002Fstyle>\n  <script src=\"3c471f7d-e9af-499d-8191-357e9c59e00b\"><\u002Fscript>\n  <style>\n    * { box-sizing: border-box; }\n    body { margin: 0; }\n    a { color: var(--flowx-blue-500); text-decoration: none; }\n    a:hover { text-decoration: underline; }\n    .fx-icnbtn:hover { background: var(--flowx-neutrals-50) !important; }\n    .fx-row:hover { background: var(--flowx-neutrals-50); }\n    input { font-family: var(--flowx-font-sans); }\n    ::-webkit-scrollbar { width: 10px; height: 10px; }\n    ::-webkit-scrollbar-thumb { background: var(--flowx-neutrals-200); border-radius: 8px; border: 2px solid #fff; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"display:flex;height:100vh;width:100vw;font-family:var(--flowx-font-sans);color:var(--flowx-text-primary);background:var(--flowx-neutrals-50);overflow:hidden;\">\n\n  <!-- ============ CANVAS ============ -->\n  <div style=\"position:relative;flex:1;min-width:0;overflow:hidden;background-color:#fbfcfd;background-image:radial-gradient(var(--flowx-neutrals-200) 1.1px, transparent 1.1px);background-size:22px 22px;\">\n\n    <!-- thin canvas toolbar -->\n    <div style=\"position:absolute;top:0;left:0;right:0;height:48px;background:#fff;border-bottom:1px solid var(--flowx-neutrals-100);display:flex;align-items:center;gap:16px;padding:0 20px;z-index:2;\">\n      <div style=\"display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;\"><i class=\"ph ph-tree-structure\" style=\"color:var(--flowx-blue-500);font-size:18px;\"><\u002Fi>Main_Process_With_Nodes<\u002Fdiv>\n      <div style=\"width:1px;height:20px;background:var(--flowx-neutrals-100);\"><\u002Fdiv>\n      <spa nk:0;\">{{ ln.n }}<\u002Fspan>\n                <span style=\"white-space:pre;color:var(--flowx-neutrals-800);\">{{ ln.text }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- modal footer -->\n      <div style=\"height:64px;flex-shrink:0;border-top:1px solid var(--flowx-neutrals-100);display:flex;align-items:center;padding:0 22px;gap:12px;\">\n        <div sc-camel-on-click=\"{{ pickProject }}\" style=\"display:flex;align-items:center;height:32px;padding:0 12px;border-left:3px solid {{ projBar }};font-size:13px;font-weight:600;color:{{ projColor }};cursor:pointer;\">Project Data Model<\u002Fdiv>\n        <div sc-camel-on-click=\"{{ pickWorkflow }}\" style=\"display:flex;align-items:center;height:32px;padding:0 12px;border-left:3px solid {{ wfBar }};font-size:13px;font-weight:600;color:{{ wfColor }};cursor:pointer;\">Workflow Data Model<\u002Fdiv>\n        <div style=\"flex:1;\"><\u002Fdiv>\n        <button sc-camel-on-click=\"{{ close }}\" style=\"height:38px;padding:0 22px;border:none;border-radius:8px;background:var(--flowx-blue-500);color:#fff;font-size:14px;font-weight:600;cursor:pointer;\">Save<\u002Fbutton>\n      <\u002Fdiv>\n\n      <!-- floating AI -->\n      <button title=\"Ask AI\" style=\"position:absolute;right:22px;bottom:80px;width:46px;height:46px;border-radius:50%;border:none;background:#2a313a;color:var(--flowx-yellow-400);display:grid;place-items:center;cursor:pointer;box-shadow:var(--flowx-shadow-m);\"><i class=\"ph ph-sparkle\" style=\"font-size:22px;\"><\u002Fi><\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    nodeTab: 'input', nodeCodeOpen: true,\n    panelOpen: true, legacy: false,\n    checks: { ef1: false, ef2: false },\n    copyRows: [1], excludeRows: [1],\n    modalOpen: false, modalKey: null,\n    values: {}, expanded: {}, selectedSource: null, preview: null,\n    bottomTab: 'project',\n  };\n\n  configs() {\n    return {\n      start: {\n        title: 'Data Mapping · Integration Start Node · Start',\n        leftName: 'Main_Process_With_Nodes', leftSub: 'Variables sent by the parent workflow',\n        rightName: 'Connected_Workflow', rightSub: 'Variables expected by the workflow',\n        sources: [{ label: 'client', type: 'Client { }', children: [\n          { label: 'firstname', type: 'string', path: 'client.firstname', sample: 'Jane' },\n          { label: 'lastname', type: 'string', path: 'client.lastname', sample: 'Doe' },\n          { label: 'fullName', type: 'string', path: 'client.fullName', sample: 'Jane Doe' },\n        ] }],\n        targets: [{ name: 'firstName', type: 'string' }, { name: 'lastName', type: 'string' }],\n      },\n      ef1: {\n        title: 'Data Mapping · End Flow 001',\n        leftName: 'Connected_Workflow', leftSub: 'Variables returned by the subworkflow',\n        rightName: 'Main_Process_With_Nodes', rightSub: 'Variables received by the parent workflow',\n        sources: [{ label: 'response', type: 'Response { }', children: [\n          { label: 'decision', type: 'string', path: 'response.decision', sample: 'APPROVED' },\n          { label: 'score', type: 'number', path: 'response.score', sample: 720 },\n        ] }],\n        targets: [{ name: 'applicationDecision', type: 'string' }, { name: 'creditScore', type: 'number' }],\n      },\n      ef2: {\n        title: 'Data Mapping · End Flow 002',\n        leftName: 'Connected_Workflow', leftSub: 'Variables returned by the subworkflow',\n        rightName: 'Main_Process_With_Nodes', rightSub: 'Variables received by the parent workflow',\n        sources: [{ label: 'rejection', type: 'Rejection { }', children: [\n          { label: 'reason', type: 'string', path: 'rejection.reason', sample: 'INSUFFICIENT_HISTORY' },\n          { label: 'code', type: 'string', path: 'rejection.code', sample: 'E1042' },\n        ] }],\n        targets: [{ name: 'declineReason', type: 'string' }, { name: 'declineCode', type: 'string' }],\n      },\n    };\n  }\n  cfg() { return this.state.modalKey ? this.configs()[this.state.modalKey] : null; }\n  addRow(key) { this.setState(s => ({ [key]: [...s[key], Date.now()] })); }\n  delRow(key, i) { this.setState(s => ({ [key]: s[key].filter((_, idx) => idx !== i) })); }\n\n  open(key) { this.setState({ modalOpen: true, modalKey: key, values: {}, selectedSource: null, expanded: {}, preview: null }); }\n  close() { this.setState({ modalOpen: false }); }\n  toggleTree(l) { this.setState(s => ({ expanded: { ...s.expanded, [l]: s.expanded[l] === false } })); }\n  pick(p) { this.setState(s => ({ selectedSource: s.selectedSource === p ? null : p })); }\n  assign(name) { this.setState(s => s.selectedSource ? ({ values: { ...s.values, [name]: s.selectedSource }, selectedSource: null, preview: null }) : {}); }\n  clearField(name, e) { if (e && e.stopPropagation) e.stopPropagation(); this.setState(s => { const v = { ...s.values }; delete v[name]; return { values: v, preview: null }; }); }\n  clearAll() { this.setState({ values: {}, selectedSource: null, preview: null }); }\n  sampleFor(path) { const c = this.cfg(); for (const s of c.sources) { for (const ch of s.children) { if (ch.path === path) return ch.sample; } } return null; }\n  test() {\n    const c = this.cfg(); const obj = {};\n    c.targets.forEach(f => { const p = this.state.values[f.name]; if (p != null) obj[f.name] = this.sampleFor(p); });\n    const txt = Object.keys(obj).length ? JSON.stringify(obj, null, 2) : '{}';\n    this.setState({ preview: txt.split('\\n').map((t, i) => ({ n: String(i + 1), text: t })) });\n  }\n\n  renderVals() {\n    const s = this.state, c = this.cfg();\n    const tree = c ? c.sources.map(src => {\n      const ex = s.expanded[src.label] !== false;\n      return {\n        label: src.label, type: src.type, expanded: ex,\n        caret: ex ? 'ph-caret-down' : 'ph-caret-right',\n        onToggle: () => this.toggleTree(src.label),\n        children: src.children.map(ch => ({\n          label: ch.label, type: ch.type,\n          bg: s.selectedSource === ch.path ? 'var(--flowx-blue-50)' : 'transparent',\n          bar: s.selectedSource === ch.path ? 'var(--flowx-blue-500)' : '#8b5cf6',\n          onPick: () => this.pick(ch.path),\n        })),\n      };\n    }) : [];\n    const targets = c ? c.targets.map(f => {\n      const v = s.values[f.name]; const active = s.selectedSource && !v;\n      return {\n        name: f.name, type: f.type, hasValue: !!v, empty: !v,\n        expr: v ? ('${' + v + '}') : '',\n        bg: active ? 'var(--flowx-blue-50)' : '#fff',\n        border: active ? '1px dashed var(--flowx-blue-500)' : '1px solid var(--flowx-neutrals-200)',\n        onPick: () => this.assign(f.name),\n        onClear: (e) => this.clearField(f.name, e),\n      };\n    }) : [];\n    const mkOut = (key, label) => ({\n      key, label, checked: !!s.checks[key],\n      checkBg: s.checks[key] ? 'var(--flowx-blue-500)' : '#fff',\n      onCheck: () => this.setState(st => ({ checks: { ...st.checks, [key]: !st.checks[key] } })),\n      onOpen: () => this.open(key),\n    });\n    return {\n      isInput: s.nodeTab === 'input', isOutput: s.nodeTab === 'output',\n      inputColor: s.nodeTab === 'input' ? 'var(--flowx-blue-500)' : 'var(--flowx-neutrals-500)',\n      inputBorder: s.nodeTab === 'input' ? '2px solid var(--flowx-blue-500)' : '2px solid transparent',\n      outputColor: s.nodeTab === 'output' ? 'var(--flowx-blue-500)' : 'var(--flowx-neutrals-500)',\n      outputBorder: s.nodeTab === 'output' ? '2px solid var(--flowx-blue-500)' : '2px solid transparent',\n      onInput: () => this.setState({ nodeTab: 'input' }),\n      onOutput: () => this.setState({ nodeTab: 'output' }),\n      nodeCodeOpen: s.nodeCodeOpen,\n      toggleCode: () => this.setState(st => ({ nodeCodeOpen: !st.nodeCodeOpen })),\n      nodeCaret: s.nodeCodeOpen ? 'ph-caret-up' : 'ph-caret-down',\n      openNode: () => this.open('start'),\n      panelOpen: s.panelOpen,\n      togglePanel: () => this.setState(st => ({ panelOpen: !st.panelOpen })),\n      panelCaret: s.panelOpen ? 'ph-caret-up' : 'ph-caret-down',\n      legacyOn: s.legacy,\n      legTrack: s.legacy ? 'var(--flowx-blue-500)' : '#fff',\n      legBorder: s.legacy ? 'var(--flowx-blue-500)' : 'var(--flowx-neutrals-300)',\n      legKnobX: s.legacy ? '20px' : '2px',\n      legKnob: s.legacy ? '#fff' : '#2a313a',\n      toggleLegacy: () => this.setState(st => ({ legacy: !st.legacy })),\n      legacyOff: !s.legacy,\n      copyRows: s.copyRows.map((id, i) => ({ id: String(id), onDel: () => this.delRow('copyRows', i) })),\n      excludeRows: s.excludeRows.map((id, i) => ({ id: String(id), onDel: () => this.delRow('excludeRows', i) })),\n      addCopy: () => this.addRow('copyRows'),\n      addExclude: () => this.addRow('excludeRows'),\n      openStart: () => this.open('start'),\n      outputs: [mkOut('ef1', 'End Flow 001'), mkOut('ef2', 'End Flow 002')],\n      modalOpen: s.modalOpen, close: () => this.close(),\n      title: c ? c.title : '',\n      leftName: c ? c.leftName : '', leftSub: c ? c.leftSub : '',\n      rightName: c ? c.rightName : '', rightSub: c ? c.rightSub : '',\n      tree, targets, preview: s.preview || [{ n: '1', text: '' }],\n      test: () => this.test(), clearAll: () => this.clearAll(),\n      projBar: s.bottomTab === 'project' ? '#8b5cf6' : 'transparent',\n      wfBar: s.bottomTab === 'workflow' ? '#8b5cf6' : 'transparent',\n      projColor: s.bottomTab === 'project' ? 'var(--flowx-text-primary)' : 'var(--flowx-text-secondary)',\n      wfColor: s.bottomTab === 'workflow' ? 'var(--flowx-text-primary)' : 'var(--flowx-text-secondary)',\n      pickProject: () => this.setState({ bottomTab: 'project' }),\n      pickWorkflow: () => this.setState({ bottomTab: 'workflow' }),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
